name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Type-check — backend + shared packages
  # ─────────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install
        working-directory: .

      - name: Build shared config
        run: bun run build
        working-directory: packages/shared-config
        continue-on-error: true

      - name: Build shared constants
        run: bun run build
        working-directory: packages/shared-constants
        continue-on-error: true

      - name: Build shared types
        run: bun run build
        working-directory: packages/shared-types
        continue-on-error: true

      - name: Build shared db
        run: bun run build
        working-directory: packages/shared-db
        continue-on-error: true

      - name: Build shared utils
        run: bun run build
        working-directory: packages/shared-utils
        continue-on-error: true

      - name: Type-check backend
        run: bun run type-check
        working-directory: backend

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Backend Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rsl_user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rsldb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Build shared config
        run: bun run build
        working-directory: packages/shared-config
        continue-on-error: true

      - name: Build shared constants
        run: bun run build
        working-directory: packages/shared-constants
        continue-on-error: true

      - name: Build shared types
        run: bun run build
        working-directory: packages/shared-types
        continue-on-error: true

      - name: Build shared db
        run: bun run build
        working-directory: packages/shared-db
        continue-on-error: true

      - name: Build shared utils
        run: bun run build
        working-directory: packages/shared-utils
        continue-on-error: true

      - name: Run migrations
        run: bun run db:migrate
        working-directory: backend
        env:
          NODE_ENV: test
          LOG_LEVEL: error
          PORT: 8080
          DATABASE_URL: postgresql://rsl_user:password@localhost:5432/rsldb_test
          DATABASE_URL_READ_REPLICA: postgresql://rsl_user:password@localhost:5432/rsldb_test
          TEST_DATABASE_URL: postgresql://rsl_user:password@localhost:5432/rsldb_test
